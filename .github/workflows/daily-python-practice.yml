          textwrap.dedent("""\
          def is_valid_parentheses(s: str) -> bool:
              \"\"\"Check if parentheses string is valid.\"\"\"
              stack = []
              mapping = {')': '(', ']': '[', '}': '{'}
              for char in s:
                  if char in mapping.values():
                      stack.append(char)
                  elif char in mapping:
                      if not stack or stack[-1] != mapping[char]:
