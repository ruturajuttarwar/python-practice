          # ── Track solved problems ──
          tracker_path = ".daily/solved.json"
          if os.path.exists(tracker_path):
              with open(tracker_path, "r") as f:
                  solved = json.load(f)
          else:
              os.makedirs(".daily", exist_ok=True)
              solved = []

          available = [(i, p) for i, p in enumerate(PROBLEMS) if p[1] not in solved]

          if len(available) < num_commits:
              print("Resetting problem pool — all problems solved!")
              solved = []
              available = list(enumerate(PROBLEMS))

          chosen = random.sample(available, min(num_commits, len(available)))
          committed = 0

          for commit_num, (idx, problem) in enumerate(chosen, 1):
              category, slug, title, description, solution, tests = problem

              dir_path = category
              os.makedirs(dir_path, exist_ok=True)

              file_content = f'"""\nProblem: {title}\nCategory: {category.title()}\nDate: {today.isoformat()}\n\nDescription:\n    {description}\n"""\n\n\n{solution}\n\n# ── Tests ──\nif __name__ == "__main__":\n{textwrap.indent(tests, "    ")}    print(f"All tests passed for: {title}")\n'

              file_path = f"{dir_path}/{slug}.py"
              with open(file_path, "w") as f:
                  f.write(file_content)

              result = subprocess.run(["python3", file_path], capture_output=True, text=True)
              if result.returncode != 0:
                  print(f"Tests failed for {slug}: {result.stderr}")
                  continue

              solved.append(slug)
              with open(tracker_path, "w") as f:
                  json.dump(solved, f, indent=2)

              messages = [
                  f"solve: {title} ({category})",
                  f"add {category} problem: {title}",
                  f"practice: {title}",
                  f"solve {slug} problem",
                  f"add solution for {title}",
                  f"complete: {title} ({category})",
              ]
              commit_msg = random.choice(messages)

              subprocess.run(["git", "add", file_path, tracker_path], check=True)
              subprocess.run(["git", "commit", "-m", commit_msg], check=True)
              committed += 1
              print(f"  Commit {commit_num}/{num_commits}: {commit_msg}")

          if committed > 0:
              subprocess.run(["git", "push"], check=True)
              print(f"\nDone! Pushed {committed} commit(s) for {today}")
          else:
              print("No commits made today.")
          PYTHON_SCRIPT
        env:
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
